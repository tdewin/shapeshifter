<text x="668.292" y="118.95" text-anchor="start" fill="rgb(229,50,66)" font-size="156.25%" dominant-baseline="central">Deployments</text>
<text x="668.292" y="149.664" text-anchor="start" fill="rgb(51,51,51)" font-size="80%" dominant-baseline="central">A Deployment manages a set of Pods to run an application workload, usually one that doesn't maintain state.</text>
<text x="668.292" y="224.55" text-anchor="start" fill="rgb(229,50,66)" font-size="156.25%" dominant-baseline="central">StatefulSet</text>
<text x="668.292" y="255.264" text-anchor="start" fill="rgb(51,51,51)" font-size="80%" dominant-baseline="central">A StatefulSet runs a group of Pods, and maintains a sticky identity for each of those Pods. This is useful for managing applications that need persistent storage or a stable, unique network identity.</text>
<text x="668.292" y="330.15" text-anchor="start" fill="rgb(229,50,66)" font-size="156.25%" dominant-baseline="central">DaemonSet</text>
<text x="668.292" y="360.864" text-anchor="start" fill="rgb(51,51,51)" font-size="80%" dominant-baseline="central">A DaemonSet defines Pods that provide node-local facilities. These might be fundamental to the operation of your cluster, such as a networking helper tool, or be part of an add-on.</text>
<text x="994.692" y="61.35" text-anchor="middle" fill="rgb(0,0,0)" font-size="156.25%" dominant-baseline="central">Workload Types</text>
<path d="M610.692,218.16L1378.69,218.16"  style="fill:none;stroke-width:0.072;stroke:rgb(0,0,0);" />
<path d="M994.692,2.16L994.692,434.16"  style="fill:none;stroke-width:0.072;stroke:rgb(0,0,0);" />
